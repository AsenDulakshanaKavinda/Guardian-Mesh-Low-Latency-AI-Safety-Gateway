syntax = "proto3";

package ml_service;

service PromptClassificationService {
  rpc ClassifyPrompts (ClassificationRequest) returns (ClassificationResponse);
}

message ClassificationRequest {
    string prompt_id = 1;
    string user_id = 2;
    string text = 3;
}

message ClassificationResponse {
    string prompt_id = 1;
    string user_id = 2;
    string text = 2;
    bool is_prompt_injected = 3;
    string type = 4;
}